# alembic.ini — Alembic configuration file
# The actual database URL is read from the DATABASE_URL environment variable
# in migrations/env.py, so the sqlalchemy.url here is a placeholder.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Placeholder — overridden in migrations/env.py via os.environ["DATABASE_URL"]
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/dbname

[post_write_hooks]
# Uncomment to auto-format generated migration files with ruff:
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
